<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>AI Chat (2 Class Layout)</title>

<style>
* { box-sizing: border-box; }
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f0f2f5;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

header {
    padding: 15px;
    background: #0078ff;
    color: white;
    font-size: 18px;
    text-align: center;
}

#chatbox {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
}

/* ⭐ 2 class để canh trái/phải */
.msg-row-left {
    display: flex;
    justify-content: flex-start; /* BOT bên trái */
    width: 100%;
}

.msg-row-right {
    display: flex;
    justify-content: flex-end;   /* USER bên phải */
    width: 100%;
}

/* Bubble */
.message {
    max-width: 100%;
    padding: 12px 16px;
    border-radius: 12px;
    line-height: 1.4;
    white-space: pre-wrap;
    word-wrap: break-word;
}

.bot {
    background: #ffffff;
    border: 1px solid #ddd;
    color: #222;
    border-bottom-left-radius: 0;
}

.user {
    background: #0078ff;
    color: white;
    border-bottom-right-radius: 0;
}

.timestamp {
    font-size: 11px;
    color: #666;
    margin-top: 3px;
}

#input-area {
    display: flex;
    gap: 10px;
    padding: 15px;
    background: white;
    border-top: 1px solid #ddd;
}

#question {
    flex: 1;
    padding: 12px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    padding: 12px 20px;
    border: none;
    border-radius: 8px;
    background: #0078ff;
    color: white;
    cursor: pointer;
    font-size: 16px;
}
button:hover { background: #005fcc; }

.typing { font-style: italic; color: #555; }
</style>
</head>

<body>

<header>AI Chatbot</header>

<div id="chatbox"></div>

<div id="input-area">
    <input id="question" type="text" placeholder="Gõ câu hỏi..." onkeydown="if(event.key==='Enter') ask();" />
    <button onclick="ask()">Gửi</button>
</div>

<script>
function addMessage(content, isUser=false) {
    const box = document.getElementById("chatbox");

    // ⭐ chọn class row theo user/bot
    const row = document.createElement("div");
    row.className = isUser ? "msg-row-right" : "msg-row-left";

    // bubble
    const msg = document.createElement("div");
    msg.className = "message " + (isUser ? "user" : "bot");
    msg.innerHTML = content;

    // timestamp
    const time = document.createElement("div");
    time.className = "timestamp";
    time.innerHTML = new Date().toLocaleTimeString();

    // wrap bubble + timestamp
    const wrap = document.createElement("div");
    wrap.style.display = "flex";
    wrap.style.flexDirection = "column";

    wrap.appendChild(msg);
    wrap.appendChild(time);

    row.appendChild(wrap);
    box.appendChild(row);

    box.scrollTop = box.scrollHeight;
}

function ask() {
    const q = document.getElementById("question").value;
    if (!q) return;

    addMessage(q, true);
    document.getElementById("question").value = "";

    // typing indicator
    const typingRow = document.createElement("div");
    typingRow.className = "msg-row-left";
    typingRow.id = "typing";

    const typing = document.createElement("div");
    typing.className = "message bot typing";
    typing.innerHTML = "AI đang trả lời...";

    typingRow.appendChild(typing);
    document.getElementById("chatbox").appendChild(typingRow);

    fetch("chat.php", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded"},
        body: "question=" + encodeURIComponent(q)
    })
    .then(res => res.json())
    .then(data => {
        typingRow.remove();
        addMessage(data.answer, false);
    });
}
</script>

</body>
</html>
